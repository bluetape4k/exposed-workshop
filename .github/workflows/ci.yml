name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 0. 시크릿 스캔 ────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-git --config .gitleaks.toml

  # ── 1. Gradle Wrapper 검증 ────────────────────────────────────────────────
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  # ── 2. 빌드 + Detekt ─────────────────────────────────────────────────────
  build:
    name: Build & Detekt
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      - name: Build (compile only)
        run: ./gradlew build -x test --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Detekt static analysis
        run: ./gradlew detekt --parallel
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/*.xml'
          retention-days: 7

  # ── 3. 테스트 — H2 (인메모리, Docker 불필요) ──────────────────────────────
  test-h2:
    name: "Test / H2"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Run tests with H2
        run: ./gradlew test -PuseDB=H2 --continue
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-h2
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 4. 테스트 — PostgreSQL (Testcontainers) ───────────────────────────────
  test-postgresql:
    name: "Test / PostgreSQL"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Run tests with PostgreSQL
        run: ./gradlew test -PuseDB=POSTGRESQL --continue
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-postgresql
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 5. 테스트 — MySQL 8 (Testcontainers) ──────────────────────────────────
  test-mysql:
    name: "Test / MySQL 8"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Run tests with MySQL 8
        run: ./gradlew test -PuseDB=MYSQL_V8 --continue
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-mysql
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 6. 테스트 커버리지 (Kover) ─────────────────────────────────────────────
  coverage:
    name: "Test Coverage (Kover)"
    runs-on: ubuntu-latest
    needs: test-h2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
      - name: Generate coverage report
        run: ./gradlew test -PuseDB=H2 koverXmlReport koverHtmlReport --continue
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          path: 'build/reports/kover/'
          retention-days: 14

  # ── 7. 결과 집계 ──────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [ gitleaks, build, test-h2, test-postgresql, test-mysql ]
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed"
